name: Deploy Website via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev --production=false

      - name: Build production assets
        run: npm run build

      - name: Prepare cPanel upload
        run: |
          rm -rf .deploy
          mkdir -p .deploy/dist
          cp -a dist/. .deploy/
          cp -a dist/. .deploy/dist/
          cp server.cjs package.json package-lock.json .npmrc .deploy/

      - name: Sync built files to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET }}
          local-dir: ./.deploy/
          dangerous-clean-slate: true
